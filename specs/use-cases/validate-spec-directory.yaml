kind: usecase
metadata:
  name: validate-spec-directory
  version: 0.1.0
  owner: ucf-core
  actor: developer
  tags: [core, cli, validation]

requires:
  - $ref: components/loaded-registry
    as: loader
    params:
      specs_dir: $inputs.specs_dir

preconditions:
  - specs_dir exists and contains at least one .yaml file

assumed_preconditions:
  - specs_dir exists and contains at least one .yaml file

steps:
  - id: validate
    use: actions/validate-spec
    input:
      registry: $loader.registry
    output:
      issues: issues
      error_count: error_count
      warning_count: warning_count
      info_count: info_count

  - id: render-results
    use: actions/render-cli-output
    depends_on: [validate]
    input:
      data:
        loaded_count: $loader.loaded_count
        load_errors: $loader.load_errors
        issues: $steps.validate.issues
        error_count: $steps.validate.error_count
        warning_count: $steps.validate.warning_count
        info_count: $steps.validate.info_count
      format: table

alternative_flows:
  - name: file-not-found
    trigger: file at path does not exist
    handles_error: FILE_NOT_FOUND
    steps:
      - id: render-file-error
        use: actions/render-cli-output
        input:
          data:
            message: spec file not found
          format: tree

  - name: yaml-syntax-error
    trigger: file is not valid YAML
    handles_error: YAML_SYNTAX_ERROR
    steps:
      - id: render-yaml-error
        use: actions/render-cli-output
        input:
          data:
            message: YAML syntax error in spec file
          format: tree

  - name: not-a-mapping
    trigger: YAML root is not a dict
    handles_error: NOT_A_MAPPING
    steps:
      - id: render-mapping-error
        use: actions/render-cli-output
        input:
          data:
            message: spec file root is not a YAML mapping
          format: tree

  - name: missing-kind
    trigger: data has no kind field
    handles_error: MISSING_KIND
    steps:
      - id: render-kind-missing
        use: actions/render-cli-output
        input:
          data:
            message: spec is missing required kind field
          format: tree

  - name: unknown-kind
    trigger: kind is not one of action, event, component, protocol, usecase, invariant
    handles_error: UNKNOWN_KIND
    steps:
      - id: render-unknown-kind
        use: actions/render-cli-output
        input:
          data:
            message: spec has unrecognized kind value
          format: tree

  - name: validation-error
    trigger: data does not conform to the Pydantic schema for its kind
    handles_error: VALIDATION_ERROR
    steps:
      - id: render-validation-error
        use: actions/render-cli-output
        input:
          data:
            message: spec data fails schema validation
          format: tree

  - name: ref-not-found
    trigger: ref points to a file that does not exist
    handles_error: REF_NOT_FOUND
    steps:
      - id: render-ref-error
        use: actions/render-cli-output
        input:
          data:
            message: referenced spec file not found
          format: tree

  - name: max-depth-exceeded
    trigger: ref chain exceeds 3 levels
    handles_error: MAX_DEPTH_EXCEEDED
    steps:
      - id: render-depth-error
        use: actions/render-cli-output
        input:
          data:
            message: ref resolution chain too deep
          format: tree

  - name: negative-depth
    trigger: depth is below minimum (negative value)
    steps:
      - id: render-depth-invalid
        use: actions/render-cli-output
        input:
          data:
            message: ref resolution depth cannot be negative
          format: tree

  - name: parse-failures
    trigger: $loader.load_errors is not empty
    steps:
      - id: render-errors
        use: actions/render-cli-output
        input:
          data:
            load_errors: $loader.load_errors
          format: table

      - id: validate-partial
        use: actions/validate-spec
        depends_on: [render-errors]
        input:
          registry: $loader.registry
        output:
          issues: issues

      - id: render-partial-results
        use: actions/render-cli-output
        depends_on: [validate-partial]
        input:
          data:
            issues: $steps.validate-partial.issues
          format: table

postconditions:
  - all loaded specs have been validated
  - all issues are reported with severity, category, and suggestion
  - exit code is 1 if any errors exist, 0 otherwise

terminal: true

invariants:
  - $ref: invariants/spec-names-unique
  - $ref: invariants/refs-resolvable
  - $ref: invariants/kind-determines-schema
  - $ref: invariants/no-circular-refs
  - $ref: invariants/required-inputs-validated
