kind: action
metadata:
  name: acquire-lock
  version: 0.1.0
  owner: ucf-core
  tags: [concurrency, locking]
  description: Framework action to acquire resource lock before critical section

input:
  resource:
    type: string
    required: true
    description: resource name to lock (e.g., "short_urls")
  key:
    type: string
    required: true
    description: specific resource key to lock (e.g., slug value)
  timeout:
    type: integer
    required: false
    description: lock timeout in milliseconds (default 5000)

output:
  lock_id:
    type: string
    description: lock identifier for release
  acquired:
    type: boolean
    description: whether lock was successfully acquired

errors:
  - code: LOCK_TIMEOUT
    status: 408
    condition: lock could not be acquired within timeout
    description: another process holds the lock

postconditions:
  - lock is acquired and held until released
  - lock_id can be used to release the lock
