kind: action
metadata:
  name: analyze-invariant-necessity
  version: "1.0"
  owner: ucf-framework
  tags: [completeness, analysis]

input:
  registry:
    type: object
    required: true
    description: loaded SpecRegistry with all specs

output:
  invariant_coverages:
    type: array
    description: testability record per invariant
  findings:
    type: array
    description: findings for untestable invariants

reads:
  - resource: spec-registry
    fields: [invariants, actions, usecases]
