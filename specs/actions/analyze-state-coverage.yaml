kind: action
metadata:
  name: analyze-state-coverage
  version: "1.0"
  owner: ucf-framework
  tags: [completeness, analysis]

input:
  registry:
    type: object
    required: true
    description: loaded SpecRegistry with all specs

output:
  state_graph:
    type: object
    description: implicit state graph with nodes and transitions
  findings:
    type: array
    description: findings for unreachable or dead-end states

reads:
  - resource: spec-registry
    fields: [usecases]
