kind: action
metadata:
  name: build-dependency-graph
  version: 0.1.0
  owner: ucf-core

input:
  registry:
    type: object
    required: true
    description: populated SpecRegistry

output:
  graph:
    type: object
    description: DependencyGraph with nodes and typed edges
  node_count:
    type: integer
  edge_count:
    type: integer

reads:
  - resource: spec_registry
    fields: [all_specs, usecases, components, protocols, events, invariants]

preconditions:
  - registry has at least one spec

postconditions:
  - every spec is a node in the graph
  - depends_on edges connect use cases to their actions/protocols/components
  - constrains edges connect invariants to the specs they guard
  - emits edges connect actions to the events they produce
