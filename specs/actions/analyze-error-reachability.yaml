kind: action
metadata:
  name: analyze-error-reachability
  version: "1.0"
  owner: ucf-framework
  tags: [completeness, analysis]

input:
  registry:
    type: object
    required: true
    description: loaded SpecRegistry with all specs

output:
  error_coverages:
    type: array
    description: coverage record per action error
  findings:
    type: array
    description: findings for uncovered errors

errors:
  - status: 400
    code: NO_ACTIONS_LOADED
    condition: registry contains no action specs

reads:
  - resource: spec-registry
    fields: [actions, usecases]
