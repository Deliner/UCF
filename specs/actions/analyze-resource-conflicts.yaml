kind: action
metadata:
  name: analyze-resource-conflicts
  version: "1.0"
  owner: ucf-framework
  tags: [completeness, analysis]

input:
  registry:
    type: object
    required: true
    description: loaded SpecRegistry with all specs

output:
  resource_conflicts:
    type: array
    description: conflict records for shared resources
  findings:
    type: array
    description: findings for unguarded resource conflicts

reads:
  - resource: spec-registry
    fields: [actions, invariants, usecases]
